name: "Test"

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: cachix/install-nix-action@v27
    - run: nix develop --command make all
    - uses: actions/upload-artifact@v7
      with:
        name: blog-target
        path: target

  spell-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/download-artifact@v7
      with:
        name: blog-target
        path: target
    - uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: test/package-lock.json
    - name: Install spell-check spec deps
      run: npm ci
      working-directory: test
    - name: Serve built blog
      run: python3 -m http.server 8080 --directory target &
    - name: Wait for server
      run: curl --retry 30 --retry-all-errors --retry-delay 2 --silent --fail http://localhost:8080 >/dev/null
    - uses: antithesishq/bombadil-action@v1
      with:
        origin: http://localhost:8080
        specification: ./test/spellcheck.ts
        time-limit: 5m
        exit-on-violation: true
        output-path: bombadil-output
    - if: always()
      uses: actions/upload-artifact@v7
      with:
        name: bombadil-output
        path: bombadil-output
